<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="1600" viewBox="0 0 1200 1600" font-family="-apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#4f46e5"/>
      <stop offset="1" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.10"/>
    </filter>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="1600" fill="#f6f8fb"/>

  <!-- ===================== HEADER ===================== -->
  <rect x="0" y="0" width="1200" height="140" fill="url(#headerGrad)"/>
  <text x="80" y="62" font-size="38" font-weight="700" fill="#ffffff">engineering-board</text>
  <text x="80" y="100" font-size="19" fill="#e0e7ff">An always-on "back office" team for your AI coding assistant</text>
  <text x="1120" y="95" text-anchor="end" font-size="14" fill="#c7d2fe">a Claude Code plugin &#183; v1.1.0</text>

  <!-- ===================== INTRO ===================== -->
  <text font-size="16" fill="#334155">
    <tspan x="80" y="190">When you work with an AI coding assistant, helpful things come up — a bug it spots, a feature idea, an open</tspan>
    <tspan x="80" y="216">question — and then vanish when the chat ends. This plugin gives the assistant a small, invisible team that</tspan>
    <tspan x="80" y="242">quietly captures those things, files them on a shared board, and can even work through them — all by itself.</tspan>
  </text>

  <!-- ===================== TIMELINE SPINE ===================== -->
  <line x1="250" y1="335" x2="250" y2="1140" stroke="#cbd5e1" stroke-width="4"/>
  <!-- directional arrows on the spine -->
  <line x1="250" y1="374" x2="250" y2="466" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="250" y1="544" x2="250" y2="661" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="250" y1="739" x2="250" y2="866" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>
  <line x1="250" y1="944" x2="250" y2="1101" stroke="#94a3b8" stroke-width="3" marker-end="url(#arrow)"/>

  <!-- ===== NODE 1: SOURCE ===== -->
  <circle cx="250" cy="340" r="34" fill="#64748b" filter="url(#shadow)"/>
  <text x="250" y="340" text-anchor="middle" dominant-baseline="central" font-size="30" font-weight="700" fill="#ffffff">0</text>
  <rect x="320" y="308" width="730" height="64" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="345" y="338" font-size="19" font-weight="700" fill="#0f172a">You and your AI assistant</text>
  <text x="345" y="360" font-size="14" fill="#475569">A normal coding conversation — you ask, it builds and explains.</text>

  <!-- trigger pill -->
  <rect x="320" y="392" width="600" height="30" rx="15" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="340" y="412" font-size="13.5" font-weight="600" fill="#4338ca">Every time the AI finishes a reply, the team below quietly goes to work — automatically.</text>

  <!-- ===== NODE 2: NOTE-TAKER ===== -->
  <circle cx="250" cy="505" r="34" fill="#2563eb" filter="url(#shadow)"/>
  <text x="250" y="505" text-anchor="middle" dominant-baseline="central" font-size="30" font-weight="700" fill="#ffffff">1</text>
  <rect x="320" y="437" width="730" height="135" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="345" y="476" font-size="21" font-weight="700" fill="#0f172a">The Note-Taker</text>
  <text x="1030" y="474" text-anchor="end" font-size="12.5" fill="#94a3b8">technical name: finding-extractor</text>
  <text font-size="14.5" fill="#334155">
    <tspan x="345" y="506">Re-reads what was just said and quietly writes down anything worth remembering —</tspan>
    <tspan x="345" y="528">onto private "sticky notes", without ever interrupting the work.</tspan>
  </text>
  <text font-size="13.5" fill="#475569">
    <tspan x="345" y="556">Looks for: </tspan><tspan fill="#ef4444" font-size="15">&#9679;</tspan><tspan> Bugs   </tspan><tspan fill="#10b981" font-size="15">&#9679;</tspan><tspan> Features   </tspan><tspan fill="#3b82f6" font-size="15">&#9679;</tspan><tspan> Questions   </tspan><tspan fill="#8b5cf6" font-size="15">&#9679;</tspan><tspan> Observations</tspan>
  </text>

  <!-- ===== NODE 3: PROJECT MANAGER ===== -->
  <circle cx="250" cy="700" r="34" fill="#7c3aed" filter="url(#shadow)"/>
  <text x="250" y="700" text-anchor="middle" dominant-baseline="central" font-size="30" font-weight="700" fill="#ffffff">2</text>
  <rect x="320" y="632" width="730" height="135" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="345" y="671" font-size="21" font-weight="700" fill="#0f172a">The Project Manager</text>
  <text x="1030" y="669" text-anchor="end" font-size="12.5" fill="#94a3b8">technical name: consolidator + tidier</text>
  <text font-size="14.5" fill="#334155">
    <tspan x="345" y="701">Reviews each sticky note against what was actually said. Throws out duplicates and</tspan>
    <tspan x="345" y="723">anything made-up. Pins only the genuine findings to the board below —</tspan>
    <tspan x="345" y="745">and keeps everything tidy and organized.</tspan>
  </text>

  <!-- ===== NODE 4: THE BOARD ===== -->
  <circle cx="250" cy="905" r="34" fill="#0f172a" filter="url(#shadow)"/>
  <text x="250" y="905" text-anchor="middle" dominant-baseline="central" font-size="30" font-weight="700" fill="#ffffff">3</text>
  <rect x="320" y="827" width="730" height="158" rx="14" fill="#ffffff" stroke="#cbd5e1" stroke-width="2" filter="url(#shadow)"/>
  <text x="345" y="864" font-size="21" font-weight="700" fill="#0f172a">The Board <tspan font-size="15" font-weight="400" fill="#64748b">— the shared, lasting record</tspan></text>
  <text font-size="14.5" fill="#334155">
    <tspan x="345" y="894">A simple set of text files that live inside your project. Anyone can read them — like</tspan>
    <tspan x="345" y="916">ordinary pages on GitHub. Findings are sorted into four trays:</tspan>
  </text>
  <!-- trays -->
  <rect x="345" y="932" width="160" height="40" rx="8" fill="#fee2e2"/>
  <text x="425" y="957" text-anchor="middle" font-size="14" font-weight="600" fill="#991b1b">Bugs</text>
  <rect x="521" y="932" width="160" height="40" rx="8" fill="#dcfce7"/>
  <text x="601" y="957" text-anchor="middle" font-size="14" font-weight="600" fill="#166534">Features</text>
  <rect x="697" y="932" width="160" height="40" rx="8" fill="#dbeafe"/>
  <text x="777" y="957" text-anchor="middle" font-size="14" font-weight="600" fill="#1e40af">Questions</text>
  <rect x="873" y="932" width="160" height="40" rx="8" fill="#ede9fe"/>
  <text x="953" y="957" text-anchor="middle" font-size="14" font-weight="600" fill="#5b21b6">Observations</text>

  <!-- ===== NODE 5: BUILD TEAM ===== -->
  <circle cx="250" cy="1140" r="34" fill="#059669" filter="url(#shadow)"/>
  <text x="250" y="1140" text-anchor="middle" dominant-baseline="central" font-size="30" font-weight="700" fill="#ffffff">4</text>
  <rect x="320" y="1037" width="730" height="205" rx="14" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <text x="345" y="1074" font-size="21" font-weight="700" fill="#0f172a">The Build Team</text>
  <text x="1030" y="1072" text-anchor="end" font-size="12.5" fill="#94a3b8">tdd-builder &#183; code-reviewer &#183; validator</text>
  <text font-size="14.5" fill="#334155">
    <tspan x="345" y="1104">Picks tasks off the board and moves each one down an assembly line until it is</tspan>
    <tspan x="345" y="1126">genuinely finished:</tspan>
  </text>
  <!-- assembly line -->
  <rect x="345" y="1142" width="150" height="44" rx="8" fill="#dbeafe"/>
  <text x="420" y="1169" text-anchor="middle" font-size="15" font-weight="700" fill="#1e40af">Build</text>
  <text x="420" y="1203" text-anchor="middle" font-size="11.5" fill="#64748b">write a test, then fix</text>
  <path d="M503,1156 L519,1164 L503,1172 Z" fill="#94a3b8"/>
  <rect x="525" y="1142" width="150" height="44" rx="8" fill="#ede9fe"/>
  <text x="600" y="1169" text-anchor="middle" font-size="15" font-weight="700" fill="#5b21b6">Review</text>
  <text x="600" y="1203" text-anchor="middle" font-size="11.5" fill="#64748b">check the work</text>
  <path d="M683,1156 L699,1164 L683,1172 Z" fill="#94a3b8"/>
  <rect x="705" y="1142" width="150" height="44" rx="8" fill="#cffafe"/>
  <text x="780" y="1169" text-anchor="middle" font-size="15" font-weight="700" fill="#155e75">Double-check</text>
  <text x="780" y="1203" text-anchor="middle" font-size="11.5" fill="#64748b">confirm it really works</text>
  <path d="M863,1156 L879,1164 L863,1172 Z" fill="#94a3b8"/>
  <rect x="885" y="1142" width="150" height="44" rx="8" fill="#dcfce7"/>
  <text x="960" y="1169" text-anchor="middle" font-size="15" font-weight="700" fill="#166534">Done &#10003;</text>
  <text x="960" y="1203" text-anchor="middle" font-size="11.5" fill="#64748b">task complete</text>
  <text x="345" y="1230" font-size="12.5" fill="#64748b" font-style="italic">A simple numbered-ticket system makes sure two workers never grab the same task at once.</text>

  <!-- ===================== MODES ===================== -->
  <text x="80" y="1310" font-size="20" font-weight="700" fill="#0f172a">You choose how much of the team is awake — with one command</text>

  <!-- mode card 1 -->
  <rect x="80" y="1330" width="248" height="190" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="80" y="1330" width="248" height="8" rx="4" fill="#64748b"/>
  <text x="104" y="1372" font-size="16" font-weight="700" fill="#0f172a">Passive</text>
  <text x="104" y="1392" font-size="12" fill="#64748b">the default</text>
  <text font-size="13" fill="#334155">
    <tspan x="104" y="1422">Only the Note-Taker runs.</tspan>
    <tspan x="104" y="1442">Captures everything,</tspan>
    <tspan x="104" y="1462">disturbs nothing.</tspan>
  </text>
  <rect x="104" y="1480" width="120" height="24" rx="6" fill="#f1f5f9"/>
  <text x="114" y="1497" font-size="12" font-family="monospace" fill="#475569">(automatic)</text>

  <!-- mode card 2 -->
  <rect x="348" y="1330" width="248" height="190" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="348" y="1330" width="248" height="8" rx="4" fill="#7c3aed"/>
  <text x="372" y="1372" font-size="16" font-weight="700" fill="#0f172a">PM mode</text>
  <text x="372" y="1392" font-size="12" fill="#64748b">project-manager on</text>
  <text font-size="13" fill="#334155">
    <tspan x="372" y="1422">Adds the Project Manager.</tspan>
    <tspan x="372" y="1442">Notes get checked and</tspan>
    <tspan x="372" y="1462">filed onto the board.</tspan>
  </text>
  <rect x="372" y="1480" width="120" height="24" rx="6" fill="#f5f3ff"/>
  <text x="382" y="1497" font-size="12" font-family="monospace" fill="#6d28d9">/pm-start</text>

  <!-- mode card 3 -->
  <rect x="616" y="1330" width="248" height="190" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="616" y="1330" width="248" height="8" rx="4" fill="#059669"/>
  <text x="640" y="1372" font-size="16" font-weight="700" fill="#0f172a">Worker mode</text>
  <text x="640" y="1392" font-size="12" fill="#64748b">build-team on</text>
  <text font-size="13" fill="#334155">
    <tspan x="640" y="1422">Wakes the Build Team.</tspan>
    <tspan x="640" y="1442">Tasks get built, reviewed,</tspan>
    <tspan x="640" y="1462">and finished.</tspan>
  </text>
  <rect x="640" y="1480" width="170" height="24" rx="6" fill="#ecfdf5"/>
  <text x="650" y="1497" font-size="11.5" font-family="monospace" fill="#047857">/worker-start</text>

  <!-- mode card 4 -->
  <rect x="884" y="1330" width="236" height="190" rx="12" fill="#ffffff" stroke="#e2e8f0" filter="url(#shadow)"/>
  <rect x="884" y="1330" width="236" height="8" rx="4" fill="#94a3b8"/>
  <text x="908" y="1372" font-size="16" font-weight="700" fill="#0f172a">Paused</text>
  <text x="908" y="1392" font-size="12" fill="#64748b">everyone off</text>
  <text font-size="13" fill="#334155">
    <tspan x="908" y="1422">The whole team stops —</tspan>
    <tspan x="908" y="1442">for free-form thinking</tspan>
    <tspan x="908" y="1462">and brainstorming.</tspan>
  </text>
  <rect x="908" y="1480" width="140" height="24" rx="6" fill="#f1f5f9"/>
  <text x="918" y="1497" font-size="12" font-family="monospace" fill="#475569">/board-pause</text>

  <!-- ===================== FOOTER ===================== -->
  <line x1="80" y1="1552" x2="1120" y2="1552" stroke="#e2e8f0" stroke-width="1"/>
  <text x="80" y="1578" font-size="13" fill="#64748b">Everything is plain text inside your project — nothing hidden. You can read, search, and review the whole board on GitHub like any other file.</text>
</svg>
